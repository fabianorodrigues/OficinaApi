name:  workflow - OfininaApi

on: 
  push:
    branches: [main, developer, feat/jaque]

jobs:
    job1:
        name: Build, Push e Deploy
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        # Docker login
        - name: Docker Login
          uses: docker/login-action@v4.0.0
          with:
            username: jaquelineramosit
            password: ${{ secrets.DOCKERHUB_PA_SECRET}}

        # Build e push Docker
        - name: Build and push Docker
          uses: docker/build-push-action@v7.0.0
          with:
            context: .
            file: ./docker/Dockerfile
            tags: |
              jaquelineramosit/oficina-api:latest
              jaquelineramosit/oficina-api:${{ github.sha }}
            push: true

        # Configura AWS
        - name: AWS Credentials
          uses: aws-actions/configure-aws-credentials@v3
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        # Terraform
        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v2
          with:
            terraform_version: 1.6.0

        - name: Terraform Init EKS
          run: terraform init ./terraform/eks

        - name: Terraform Apply EKS
          run: terraform apply -auto-approve ./terraform/eks

        - name: Terraform Init Kubernetes
          run: terraform init ./terraform/kubernetes

        - name: Terraform Apply Kubernetes
          run: terraform apply -auto-approve ./terraform/kubernetes

        # Setup kubectl
        - name: Setup kubectl
          uses: azure/setup-kubectl@v3
          with:
            version: 'v1.27.0'

        # Configura kubeconfig do EKS
        - name: Configure kubeconfig
          run: |
            aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name oficina-cluster

        # Deploy Kubernetes
        - name: Deploy Kubernetes
          run: |
            kubectl apply -f ./k8s/namespace.yaml
            kubectl apply -f ./k8s/deployment.yaml
            kubectl apply -f ./k8s/service.yaml