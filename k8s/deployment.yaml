apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oficina-api
  template:
    metadata:
      labels:
        app: oficina-api
    spec:
      containers:
        - name: oficina-api
          image: oficina-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: oficina-config
                  key: ASPNETCORE_ENVIRONMENT

            - name: ConnectionStrings__SqlServer
              valueFrom:
                secretKeyRef:
                  name: oficina-secret
                  key: CONNECTION_STRING
            - name: RUN_MIGRATION
              value: "false"